name: baby_cry_analyzer
description: Offline AI-powered baby cry analysis application with federated learning
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Audio Processing
  record: ^5.0.4
  audioplayers: ^5.2.1
  flutter_sound: ^9.2.13
  
  # AI/ML
  tflite_flutter: ^0.10.4
  tflite_flutter_helper: ^0.3.1
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  
  # Audio Analysis
  fft: ^2.0.0
  ml_linalg: ^13.17.0
  
  # UI Components
  cupertino_icons: ^1.0.6
  lottie: ^2.7.0
  fl_chart: ^0.66.0
  
  # Permissions
  permission_handler: ^11.1.0
  
  # Utils
  uuid: ^4.2.1
  intl: ^0.19.0
  
  # Encryption for federated learning
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/
    - assets/sounds/
    - assets/animations/
    - assets/icons/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700