name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: TypeScript check
      run: npx tsc --noEmit

    - name: Expo doctor check
      run: npx expo-doctor

    - name: Project structure check
      run: node scripts/test-setup.js

    - name: Build for web (test)
      run: npx expo export:web

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check for console.log usage
      run: |
        if grep -r "console\." --include="*.ts" --include="*.tsx" app/ components/ lib/ ai/ --exclude-dir=node_modules; then
          echo "❌ Found console.log usage. Please use logger utilities instead."
          exit 1
        else
          echo "✅ No console.log usage found"
        fi

    - name: Check for any types
      run: |
        if grep -r ": any" --include="*.ts" --include="*.tsx" . --exclude-dir=node_modules; then
          echo "❌ Found 'any' types. Please use specific types."
          exit 1
        else
          echo "✅ No 'any' types found"
        fi

  security:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: npm audit --audit-level=moderate

    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD